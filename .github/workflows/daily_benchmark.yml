name: Daily LLM Benchmark Pipeline

on:
  schedule:
    # Run automatically every 24 hours at 00:00 UTC (SLA compliance)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual execution from the GitHub Actions tab

jobs:
  run-pipeline:
    name: Run Benchmark & Update Firestore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Create Firebase Service Account SDK JSON
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > firebase-admin-sdk.json
        shell: bash

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Ingestion Pipeline
        env:
          FIREBASE_CERT_PATH: "./firebase-admin-sdk.json"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INDEXING_API_KEY: ${{ secrets.INDEXING_API_KEY }}
        run: |
          python scripts/benchmark_pipeline.py
